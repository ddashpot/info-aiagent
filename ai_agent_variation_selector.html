<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIエージェント実装バリエーション選択UI</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --accent: #111827;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #eef2ff, transparent 36%), var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .app { max-width: 1180px; margin: 0 auto; padding: 40px 20px 64px; }
    header { margin-bottom: 28px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
      border-radius: 999px; background: var(--primary-soft); color: var(--primary);
      font-size: 13px; font-weight: 700; margin-bottom: 14px;
    }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 4vw, 46px); line-height: 1.12; letter-spacing: -0.04em; }
    .lead { max-width: 780px; margin: 0; color: var(--muted); font-size: 16px; }
    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 22px; align-items: start; }
    .panel, .result, .matrix, .card {
      background: rgba(255, 255, 255, 0.86); backdrop-filter: blur(10px);
      border: 1px solid rgba(229, 231, 235, 0.9); box-shadow: var(--shadow); border-radius: var(--radius);
    }
    .panel { position: sticky; top: 18px; padding: 20px; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 7px; font-size: 13px; font-weight: 800; color: #374151; }
    select, input[type="search"] {
      width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px;
      background: #fff; color: var(--text); font-size: 14px; outline: none;
    }
    select:focus, input[type="search"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
    .button-row { display: flex; gap: 10px; margin-top: 18px; }
    button { width: 100%; border: 0; border-radius: 13px; padding: 11px 12px; font-weight: 800; cursor: pointer; transition: 0.18s ease; }
    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #eef2f7; color: #111827; }
    button:hover { transform: translateY(-1px); }
    .content { display: grid; gap: 18px; }
    .result { padding: 24px; }
    .result-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 16px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 0; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 10px; background: #f3f4f6; color: #374151; font-size: 12px; font-weight: 700; }
    .badge.primary-badge { background: var(--primary-soft); color: var(--primary); }
    .result h2 { margin: 0; font-size: 28px; letter-spacing: -0.03em; }
    .result .summary { margin: 12px 0 0; color: var(--muted); }
    .diagram { margin: 20px 0; padding: 16px; border-radius: 14px; background: #f9fafb; border: 1px dashed #d1d5db; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; white-space: pre-wrap; color: #111827; font-size: 13px; }
    .info-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 18px; }
    .info { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: #fff; }
    .info h3 { margin: 0 0 5px; font-size: 13px; color: var(--muted); }
    .info p { margin: 0; font-size: 14px; font-weight: 700; }
    .section-title { margin: 20px 0 10px; font-size: 16px; }
    ul { margin: 8px 0 0; padding-left: 20px; }
    li { margin: 5px 0; }
    .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .card { padding: 16px; cursor: pointer; transition: 0.18s ease; }
    .card:hover { transform: translateY(-2px); border-color: rgba(37, 99, 235, 0.4); }
    .card.active { border-color: var(--primary); box-shadow: 0 10px 30px rgba(37, 99, 235, 0.16); }
    .card h3 { margin: 0 0 6px; font-size: 17px; }
    .card p { margin: 0; color: var(--muted); font-size: 13px; }
    .matrix { padding: 18px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; font-size: 13px; }
    th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: #374151; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; background: #f9fafb; }
    tr:last-child td { border-bottom: 0; }
    .empty { padding: 28px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 16px; background: #fff; }
    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .panel { position: static; }
      .info-grid, .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>

        </section>
      </section>
    </section>
  </main>

      all.value = "";
      all.textContent = labelAll;
      select.appendChild(all);
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }
    function initSelects() {
      fillSelect(categorySelect, uniqueValues("category"), "すべて");
      fillSelect(placementSelect, uniqueValues("placement"), "すべて");
      fillSelect(memorySelect, uniqueValues("memory"), "すべて");
      fillSelect(roleSelect, uniqueValues("role"), "すべて");
      syncVariationSelect();
    }
    function filteredItems() {
      const q = searchInput.value.trim().toLowerCase();
      return variations.filter(item => {
        const keywordText = [item.category, item.name, item.placement, item.memory, item.role, item.summary, item.diagram, ...item.useCases, ...item.strengths, ...item.risks, ...item.keywords].join(" ").toLowerCase();
        return (!categorySelect.value || item.category === categorySelect.value)
          && (!placementSelect.value || item.placement === placementSelect.value)
          && (!memorySelect.value || item.memory === memorySelect.value)
          && (!roleSelect.value || item.role === roleSelect.value)
          && (!q || keywordText.includes(q));
      });
    }
    function syncVariationSelect() {
      const items = filteredItems();
      variationSelect.innerHTML = "";
      items.forEach(item => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = item.name;
        variationSelect.appendChild(option);
      });
      if (!items.some(item => item.id === selectedId)) selectedId = items[0]?.id || "";
      variationSelect.value = selectedId;
    }
    function currentItem() { return variations.find(item => item.id === selectedId) || filteredItems()[0] || null; }
    function renderResult() {
      const item = currentItem();
      if (!item) { result.innerHTML = `<div class="empty">条件に合う実装バリエーションがありません。</div>`; return; }
      result.innerHTML = `
        <div class="result-top"><div><h2>${item.name}</h2><div class="badge-row"><span class="badge primary-badge">${item.category}</span><span class="badge">配置: ${item.placement}</span><span class="badge">メモリ: ${item.memory}</span><span class="badge">役割: ${item.role}</span></div></div></div>
        <p class="summary">${item.summary}</p>
        <div class="diagram">${item.diagram}</div>
        <div class="info-grid"><div class="info"><h3>配置</h3><p>${item.placement}</p></div><div class="info"><h3>メモリ</h3><p>${item.memory}</p></div><div class="info"><h3>役割</h3><p>${item.role}</p></div></div>
        <h3 class="section-title">向く用途</h3><ul>${item.useCases.map(x => `<li>${x}</li>`).join("")}</ul>
        <h3 class="section-title">強み</h3><ul>${item.strengths.map(x => `<li>${x}</li>`).join("")}</ul>
        <h3 class="section-title">注意点</h3><ul>${item.risks.map(x => `<li>${x}</li>`).join("")}</ul>`;
    }
    function renderCards() {
      const items = filteredItems();
      cards.innerHTML = "";
      if (!items.length) { cards.innerHTML = `<div class="empty">候補がありません。</div>`; return; }
      items.forEach(item => {
        const card = document.createElement("article");
        card.className = `card ${item.id === selectedId ? "active" : ""}`;
        card.innerHTML = `<span class="badge primary-badge">${item.category}</span><h3>${item.name}</h3><p>${item.summary}</p>`;
        card.addEventListener("click", () => { selectedId = item.id; variationSelect.value = selectedId; render(); });
        cards.appendChild(card);
      });
    }
    function renderTable() {
      tableBody.innerHTML = filteredItems().map(item => `<tr><td>${item.category}</td><td><strong>${item.name}</strong></td><td>${item.placement}</td><td>${item.memory}</td><td>${item.role}</td><td>${item.useCases.join("、")}</td></tr>`).join("");
    }
    function render() { syncVariationSelect(); renderResult(); renderCards(); renderTable(); }
    function reset() { categorySelect.value = ""; placementSelect.value = ""; memorySelect.value = ""; roleSelect.value = ""; searchInput.value = ""; selectedId = variations[0].id; render(); }
    function copySelection() {
      const item = currentItem();
      if (!item) return;
      const text = [`実装バリエーション: ${item.name}`, `大分類: ${item.category}`, `配置: ${item.placement}`, `メモリ: ${item.memory}`, `役割: ${item.role}`, `概要: ${item.summary}`, `向く用途: ${item.useCases.join("、")}`, `強み: ${item.strengths.join("、")}`, `注意点: ${item.risks.join("、")}`].join("\n");
      navigator.clipboard.writeText(text).then(() => { copyBtn.textContent = "コピーしました"; setTimeout(() => copyBtn.textContent = "選択内容をコピー", 1200); }).catch(() => alert(text));
    }
    [categorySelect, placementSelect, memorySelect, roleSelect, searchInput].forEach(el => el.addEventListener("input", render));
    variationSelect.addEventListener("change", () => { selectedId = variationSelect.value; render(); });
    resetBtn.addEventListener("click", reset);
    copyBtn.addEventListener("click", copySelection);
    initSelects(); render();
  </script>
</body>
</html>
